                <div class="relative z-10 flex min-h-screen items-center justify-center p-4">
                    <div class="w-full max-w-md" style="opacity: 1; transform: none;">
                        <div class="relative backdrop-blur-xl bg-white/10 rounded-3xl p-8 shadow-2xl border border-white/20"
                            style="transform: none;">
                            <div class="relative z-10">
                                <div class="text-center mb-8" style="transform: none;">
                                    <div class="inline-flex items-center justify-center mb-8">
                                        <img src="monetwhite.svg" alt="Monet">
                                    </div>
                                    <h1 class="text-3xl font-bold text-white mb-2">Welcome</h1>
                                    <p class="text-white/70">Sign in to continue your journey</p>
                                </div>
                                <form class="space-y-6" [formGroup]="loginForm">
                                    <div style="opacity: 1; transform: none;">
                                        <label data-slot="label"
                                            class="items-center gap-2 text-sm leading-none font-medium select-none group-data-[disabled=true]:pointer-events-none group-data-[disabled=true]:opacity-50 peer-disabled:cursor-not-allowed peer-disabled:opacity-50 text-white mb-2 block"
                                            for="email">Email</label>
                                        <div class="relative">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round"
                                                class="lucide lucide-mail absolute left-3 top-1/2 -translate-y-1/2 text-white/50">
                                                <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                                                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                                            </svg>
                                            <input type="email" formControlName="company_email"
                                                class="flex h-9 w-full min-w-0 rounded-md border px-3 py-1 text-base transition-[color,box-shadow] outline-none disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 bg-transparent border-white/20 text-white placeholder:text-white/40" 
                                                placeholder="Enter your email">
                                        </div>
                                    </div>
                                    <div style="opacity: 1; transform: none;">
                                        <label data-slot="label"
                                            class="items-center gap-2 text-sm leading-none font-medium select-none group-data-[disabled=true]:pointer-events-none group-data-[disabled=true]:opacity-50 peer-disabled:cursor-not-allowed peer-disabled:opacity-50 text-white mb-2 block"
                                            for="password">Password</label>
                                        <div class="relative">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                                stroke-linecap="round" stroke-linejoin="round"
                                                class="lucide lucide-lock absolute left-3 top-1/2 -translate-y-1/2 text-white/50">
                                                <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                            </svg>
                                            <input [type]="showPassword ? 'text' : 'password'" formControlName="company_password"
                                                class="flex h-9 w-full min-w-0 rounded-md border px-3 py-1 text-base transition-[color,box-shadow] outline-none disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm pl-10 bg-transparent border-white/20 text-white placeholder:text-white/40"
                                                placeholder="Enter your password">
                                            <button type="button" (click)="togglePassword()"
                                                class="absolute right-3 top-1/2 -translate-y-1/2 text-white/50 hover:text-white transition-colors">
                                                @if(!showPassword){
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                                    class="lucide lucide-eye">
                                                    <path
                                                        d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0">
                                                    </path>
                                                    <circle cx="12" cy="12" r="3"></circle>
                                                </svg>
                                                }
                                                @else {
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                                    viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                                    class="lucide lucide-eye-off">
                                                    <path
                                                        d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49">
                                                    </path>
                                                    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"></path>
                                                    <path
                                                        d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143">
                                                    </path>
                                                    <path d="m2 2 20 20"></path>
                                                </svg>
                                                }

                                            </button>
                                        </div>
                                    </div>
                                    <div class="flex items-center justify-between text-sm" style="opacity: 1;">
                                        <label
                                            class="flex items-center text-white/70 cursor-pointer hover:text-white transition-colors">
                                            <input
                                                type="checkbox" class="mr-2 rounded">Remember me</label>
                                                <a href="#" class="text-purple-300 hover:text-purple-200 transition-colors">Forgot
                                            password?</a>
                                    </div>
                                    <div style="opacity: 1; transform: none;">
                                       <button type="submit" [disabled]="loginForm.invalid"
                                            class="w-full py-3 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 text-white font-semibold shadow-lg"
                                            (click)="onSubmit()">
                                            Sign In</button>
                                    </div>
                                </form>

                                <p class="text-center text-white/70 mt-6" style="opacity: 1;">Don't have an
                                    account? <a href="#"
                                        class="text-purple-300 hover:text-purple-200 font-semibold transition-colors">Sign
                                        up</a></p>
                            </div>
                        </div>
